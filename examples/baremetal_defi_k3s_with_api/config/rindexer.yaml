name: defi-swaps
project_type: no-code
networks:
  - name: ethereum
    chain_id: 1
    rpc: ${RPC_URL}/main/evm/1
  - name: base
    chain_id: 8453
    rpc: ${RPC_URL}/main/evm/8453
storage:
  clickhouse:
    enabled: true
contracts:
  - name: UniswapV4PoolManager
    details:
      - network: ethereum
        address: "0x000000000004444c5dc75cB358380D2e3dE08A90"
      - network: base
        address: "0x498581fF718922c3f8e6A244956aF099B2652b2b"
    abi: ./abis/UniswapV4PoolManager.json
    include_events:
      - Swap
    streams:
      webhooks:
        - endpoint: ${WEBHOOK_URL}/webhooks/rindexer
          shared_secret: ${RINDEXER_WEBHOOK_SECRET}
          networks:
            - ethereum
            - base
          events:
            - event_name: Swap
