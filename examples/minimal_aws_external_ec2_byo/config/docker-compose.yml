# Reference docker-compose.yml for external EC2 deployment.
# Replace placeholder values before deploying:
#   - awslogs-group: get from `terraform output -json workload_handoff | jq -r '.runtime.ec2.cloudwatch_log_group'`
# ClickHouse credentials (including password) come from Secrets Manager via pull-secrets.sh → .env
services:
  erpc:
    image: ghcr.io/erpc/erpc:latest
    container_name: erpc
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - /opt/evm-cloud/config/erpc.yaml:/config/erpc.yaml:ro
    command: ["/erpc-server", "--config", "/config/erpc.yaml"]
    env_file:
      - /opt/evm-cloud/.env
    deploy:
      resources:
        limits:
          memory: 256m
    logging:
      driver: awslogs
      options:
        awslogs-region: us-east-1
        awslogs-group: /evm-cloud/evm-cloud-external-ec2-dev
        awslogs-stream: erpc
    networks:
      - evm-cloud

  rindexer:
    image: ghcr.io/joshstevens19/rindexer:latest
    container_name: rindexer
    restart: unless-stopped
    volumes:
      - /opt/evm-cloud/config:/config:ro
    command: ["start", "--path", "/config", "indexer"]
    env_file:
      - /opt/evm-cloud/.env
    deploy:
      resources:
        limits:
          memory: 512m
    depends_on:
      erpc:
        condition: service_started
    logging:
      driver: awslogs
      options:
        awslogs-region: us-east-1
        awslogs-group: /evm-cloud/evm-cloud-external-ec2-dev
        awslogs-stream: rindexer
    networks:
      - evm-cloud

networks:
  evm-cloud:
    driver: bridge
