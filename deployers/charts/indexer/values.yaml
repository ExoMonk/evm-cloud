nameOverride: ""
fullnameOverride: ""

image:
  repository: ghcr.io/joshstevens19/rindexer
  tag: latest
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "1"
    memory: 2Gi

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}

# "deployment" (default) for long-running indexers, "job" for one-shot backfill
workloadType: deployment

replicas: 1
strategy:
  type: Recreate

job:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400

# Prometheus Operator release name for ServiceMonitor label matching
monitoringRelease: "monitoring"

storageBackend: postgres

rpcUrl: ""

# Secrets delivery mode: inline (default, K8s Secret from values), provider/external (ExternalSecret CR via ESO)
secretsMode: inline
secrets:
  storeName: ""
  storeKind: ClusterSecretStore
  secretKey: ""

postgres:
  databaseUrl: ""

clickhouse:
  url: ""
  user: "default"
  db: "default"
  password: ""

config:
  rindexerYaml: |
    name: indexer
    project_type: no_code
  abis: {}
