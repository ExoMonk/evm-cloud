{{- if eq .Values.secretsMode "inline" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "indexer.fullname" . }}-secrets
  labels:
    app.kubernetes.io/name: {{ include "indexer.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
{{- if eq .Values.storageBackend "postgres" }}
  DATABASE_URL: {{ .Values.postgres.databaseUrl | quote }}
{{- else }}
  CLICKHOUSE_PASSWORD: {{ .Values.clickhouse.password | quote }}
{{- end }}
{{- range $name, $value := .Values.extraSecretEnv }}
  {{ $name }}: {{ $value | quote }}
{{- end }}
{{- end }}
