{{- if ne .Values.secretsMode "inline" }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "indexer.fullname" . }}-secrets
  labels:
    app.kubernetes.io/name: {{ include "indexer.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  refreshInterval: 60s
  secretStoreRef:
    name: {{ .Values.secrets.storeName }}
    kind: {{ .Values.secrets.storeKind | default "ClusterSecretStore" }}
  target:
    name: {{ include "indexer.fullname" . }}-secrets
  dataFrom:
    - extract:
        key: {{ .Values.secrets.secretKey }}
{{- end }}
