{{- if eq .Values.workloadType "job" }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "indexer.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "indexer.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  backoffLimit: {{ .Values.job.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.job.ttlSecondsAfterFinished }}
  template:
    metadata:
      annotations:
        checksum/config: {{ .Values.config.rindexerYaml | sha256sum }}
      labels:
        app.kubernetes.io/name: {{ include "indexer.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      restartPolicy: Never
      {{- if .Values.priorityClassName }}
      priorityClassName: {{ .Values.priorityClassName }}
      {{- end }}
      containers:
        - name: indexer
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["start", "--path", "/config", "all"]
          env:
            - name: RPC_URL
              value: {{ .Values.rpcUrl | quote }}
{{- if eq .Values.storageBackend "postgres" }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "indexer.fullname" . }}-secrets
                  key: DATABASE_URL
{{- else }}
            - name: CLICKHOUSE_URL
              value: {{ .Values.clickhouse.url | quote }}
            - name: CLICKHOUSE_USER
              value: {{ .Values.clickhouse.user | quote }}
            - name: CLICKHOUSE_DB
              value: {{ .Values.clickhouse.db | quote }}
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "indexer.fullname" . }}-secrets
                  key: CLICKHOUSE_PASSWORD
{{- end }}
{{- range $name, $value := .Values.extraEnv }}
            - name: {{ $name }}
              value: {{ $value | quote }}
{{- end }}
{{- range $name, $value := .Values.extraSecretEnv }}
            - name: {{ $name }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "indexer.fullname" $ }}-secrets
                  key: {{ $name }}
{{- end }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
          volumeMounts:
            - name: config
              mountPath: /config/rindexer.yaml
              subPath: rindexer.yaml
              readOnly: true
            - name: abis
              mountPath: /config/abis
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ include "indexer.fullname" . }}-config
        - name: abis
          configMap:
            name: {{ include "indexer.fullname" . }}-abis
{{- with .Values.nodeSelector }}
      nodeSelector:
{{ toYaml . | indent 8 }}
{{- end }}
{{- with .Values.affinity }}
      affinity:
{{ toYaml . | indent 8 }}
{{- end }}
{{- with .Values.tolerations }}
      tolerations:
{{ toYaml . | indent 8 }}
{{- end }}
{{- end }}
