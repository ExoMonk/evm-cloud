nameOverride: ""
fullnameOverride: ""

image:
  repository: ghcr.io/erpc/erpc
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 4000

# eRPC metrics port (separate from RPC proxy port)
metricsPort: 4001

# Prometheus Operator release name for ServiceMonitor label matching
monitoringRelease: "monitoring"

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

ingress:
  enabled: false
  host: ""
  tlsProvider: ""  # "cloudflare" or "cert-manager"
  tlsSecretName: ""
  clusterIssuer: "letsencrypt-prod"
  annotations: {}

priorityClassName: ""

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}

config:
  erpcYaml: |
    logLevel: info
    server:
      listenV4: true
      httpHostV4: 0.0.0.0
      httpPort: 4000
    projects: []
