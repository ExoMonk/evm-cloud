apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.projectName }}-erpc-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  erpc.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "title": "Request Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "sum by (network) (rate(erpc_requests_total[5m]))",
              "legendFormat": "{{`{{network}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": { "drawStyle": "line", "fillOpacity": 10 },
              "unit": "reqps"
            }
          }
        },
        {
          "title": "Error Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "sum by (network) (rate(erpc_errors_total[5m])) / sum by (network) (rate(erpc_requests_total[5m]))",
              "legendFormat": "{{`{{network}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": { "drawStyle": "line", "fillOpacity": 10 },
              "unit": "percentunit",
              "max": 1
            }
          }
        },
        {
          "title": "Upstream Latency (p99)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum by (le, upstream) (rate(erpc_upstream_request_duration_seconds_bucket[5m])))",
              "legendFormat": "{{`{{upstream}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": { "drawStyle": "line", "fillOpacity": 10 },
              "unit": "s"
            }
          }
        },
        {
          "title": "Cache Hit Rate",
          "type": "stat",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            {
              "expr": "sum(rate(erpc_cache_hits_total[5m])) / (sum(rate(erpc_cache_hits_total[5m])) + sum(rate(erpc_cache_misses_total[5m])))",
              "legendFormat": "hit rate"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 0.5 },
                  { "color": "green", "value": 0.8 }
                ]
              }
            }
          }
        },
        {
          "title": "Upstream Health",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 16 },
          "targets": [
            {
              "expr": "erpc_upstream_healthy",
              "legendFormat": "{{`{{upstream}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": { "drawStyle": "line", "fillOpacity": 30 },
              "unit": "bool",
              "min": 0,
              "max": 1
            }
          }
        }
      ],
      "schemaVersion": 39,
      "tags": ["erpc", "rpc-proxy"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "title": "eRPC",
      "uid": "erpc-overview"
    }
