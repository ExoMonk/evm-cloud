{{- if or .Values.dbPassword (gt (len .Values.extraSecretEnv) 0) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "custom-service.fullname" . }}-secrets
  labels:
    app.kubernetes.io/name: {{ include "custom-service.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
{{- if .Values.dbPassword }}
  DB_PASSWORD: {{ .Values.dbPassword | quote }}
{{- end }}
{{- range $name, $value := .Values.extraSecretEnv }}
  {{ $name }}: {{ $value | quote }}
{{- end }}
{{- end }}
