apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "custom-service.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "custom-service.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    evm-cloud/component: custom-service
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "custom-service.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      annotations:
        checksum/values: {{ .Values | toJson | sha256sum }}
      labels:
        app.kubernetes.io/name: {{ include "custom-service.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        evm-cloud/component: custom-service
    spec:
      {{- if .Values.priorityClassName }}
      priorityClassName: {{ .Values.priorityClassName }}
      {{- end }}
      containers:
        - name: {{ include "custom-service.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
{{- range $name, $value := .Values.infraEnv }}
            - name: {{ $name }}
              value: {{ $value | quote }}
{{- end }}
{{- if .Values.dbPassword }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "custom-service.fullname" . }}-secrets
                  key: DB_PASSWORD
{{- end }}
{{- range $name, $value := .Values.extraEnv }}
            - name: {{ $name }}
              value: {{ $value | quote }}
{{- end }}
{{- range $name, $value := .Values.extraSecretEnv }}
            - name: {{ $name }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "custom-service.fullname" $ }}-secrets
                  key: {{ $name }}
{{- end }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
{{- if .Values.healthPath }}
          startupProbe:
            httpGet:
              path: {{ .Values.healthPath }}
              port: http
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: {{ .Values.healthPath }}
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: {{ .Values.healthPath }}
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 5
{{- end }}
{{- with .Values.nodeSelector }}
      nodeSelector:
{{ toYaml . | indent 8 }}
{{- end }}
{{- with .Values.affinity }}
      affinity:
{{ toYaml . | indent 8 }}
{{- end }}
{{- with .Values.tolerations }}
      tolerations:
{{ toYaml . | indent 8 }}
{{- end }}
