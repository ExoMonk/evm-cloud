fullnameOverride: evm-cloud-indexer
image:
  repository: ghcr.io/joshstevens19/rindexer
  tag: latest
replicas: 1
strategy:
  type: Recreate
storageBackend: postgres
rpcUrl: ""
postgres:
  databaseUrl: ""
resources:
  requests:
    cpu: "1"
    memory: 2Gi
  limits:
    cpu: "2"
    memory: 4Gi
config:
  rindexerYaml: |
    name: indexer
    project_type: no_code
  abis: {}
