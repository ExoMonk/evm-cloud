name: CLI Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag"
        required: true
        default: "v0.0.1"
      publish_homebrew:
        description: "Publish formula to Homebrew tap"
        required: true
        default: true
        type: boolean
      tap_repo:
        description: "Homebrew tap repository (owner/name)"
        required: true
        default: "ExoMonk/homebrew-tap"

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            os: linux
            arch: amd64
          - runner: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-gnu
            os: linux
            arch: arm64
          - runner: macos-latest
            rust_target: x86_64-apple-darwin
            os: darwin
            arch: amd64
          - runner: macos-latest
            rust_target: aarch64-apple-darwin
            os: darwin
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install Rust target
        working-directory: cli
        shell: bash
        run: |
          rustup target add "${{ matrix.rust_target }}"

      - name: Install cargo-dist
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-dist@0.28.0

      - name: Build release artifacts with cargo-dist
        working-directory: cli
        shell: bash
        run: |
          dist build --allow-dirty --artifacts=local --target "${{ matrix.rust_target }}"

      - name: Build CLI
        working-directory: cli
        shell: bash
        run: |
          cargo build --release --locked --target "${{ matrix.rust_target }}"

      - name: Package artifact
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NAME="evm-cloud_${VERSION}_${{ matrix.os }}_${{ matrix.arch }}"
          mkdir -p dist
          cp "cli/target/${{ matrix.rust_target }}/release/evm-cloud" "dist/evm-cloud"
          chmod +x "dist/evm-cloud"
          tar -C dist -czf "dist/${NAME}.tar.gz" evm-cloud

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*.tar.gz

  release:
    name: release-assets
    runs-on: ubuntu-latest
    needs: build
    outputs:
      version: ${{ steps.version.outputs.version }}
      tap_repo: ${{ steps.tap.outputs.tap_repo }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Resolve tap repo
        id: tap
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAP_REPO="${{ github.event.inputs.tap_repo }}"
          else
            TAP_REPO="ExoMonk/homebrew-tap"
          fi
          echo "tap_repo=$TAP_REPO" >> "$GITHUB_OUTPUT"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd release-assets
          sha256sum *.tar.gz > checksums.txt

      - name: Add installer asset
        shell: bash
        run: |
          cp scripts/install.sh release-assets/install.sh
          chmod +x release-assets/install.sh

      - name: Generate Homebrew formula
        shell: bash
        run: |
          ./scripts/generate-homebrew-formula.sh "${{ steps.version.outputs.version }}" release-assets/checksums.txt release-assets/evm-cloud.rb

      - name: Upload formula artifact
        uses: actions/upload-artifact@v4
        with:
          name: homebrew-formula
          path: release-assets/evm-cloud.rb

      - name: Upload GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          make_latest: true
          files: |
            release-assets/*.tar.gz
            release-assets/checksums.txt
            release-assets/install.sh
            release-assets/evm-cloud.rb
          fail_on_unmatched_files: true

  publish-homebrew:
    name: publish-homebrew-formula
    runs-on: ubuntu-latest
    needs: release
    if: ${{ github.event_name == 'push' || github.event.inputs.publish_homebrew == 'true' }}
    steps:
      - name: Download formula artifact
        uses: actions/download-artifact@v4
        with:
          name: homebrew-formula
          path: formula

      - name: Publish formula to tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAP_REPO: ${{ needs.release.outputs.tap_repo }}
          VERSION: ${{ needs.release.outputs.version }}
        shell: bash
        run: |
          if [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_TOKEN is not configured; skipping Homebrew publish"
            exit 0
          fi

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${TAP_REPO}.git" tap
          mkdir -p tap/Formula
          cp formula/evm-cloud.rb tap/Formula/evm-cloud.rb

          cd tap
          git config user.name "evm-cloud-bot"
          git config user.email "actions@users.noreply.github.com"

          if [ -z "$(git status --porcelain)" ]; then
            echo "No formula changes to publish"
            exit 0
          fi

          git add Formula/evm-cloud.rb
          git commit -m "evm-cloud ${VERSION}"
          git push
