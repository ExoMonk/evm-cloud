name: CLI Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag"
        required: true
        default: "v0.0.1"

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            os: linux
            arch: amd64
          - runner: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-gnu
            os: linux
            arch: arm64
          - runner: macos-13
            rust_target: x86_64-apple-darwin
            os: darwin
            arch: amd64
          - runner: macos-14
            rust_target: aarch64-apple-darwin
            os: darwin
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install Rust target
        shell: bash
        run: |
          rustup target add "${{ matrix.rust_target }}"

      - name: Build CLI
        working-directory: cli
        shell: bash
        run: |
          cargo build --release --locked --target "${{ matrix.rust_target }}"

      - name: Package artifact
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NAME="evm-cloud_${VERSION}_${{ matrix.os }}_${{ matrix.arch }}"
          mkdir -p dist
          cp "cli/target/${{ matrix.rust_target }}/release/evm-cloud" "dist/evm-cloud"
          chmod +x "dist/evm-cloud"
          tar -C dist -czf "dist/${NAME}.tar.gz" evm-cloud

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*.tar.gz

  release:
    name: release-assets
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd release-assets
          sha256sum *.tar.gz > checksums.txt

      - name: Upload GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          files: |
            release-assets/*.tar.gz
            release-assets/checksums.txt
          fail_on_unmatched_files: true
