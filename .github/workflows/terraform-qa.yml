name: Terraform QA

on:
  pull_request:
    paths:
      - "**.tf"
      - "Makefile"
      - "examples/**"
      - "modules/**"
      - "deployers/**"
      - "tests/**"
  push:
    branches: [main]
    paths:
      - "**.tf"
      - "Makefile"
      - "examples/**"
      - "modules/**"
      - "deployers/**"
      - "tests/**"
  workflow_dispatch:

jobs:
  qa:
    name: QA — fmt + validate + lint + security
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-checkov
          restore-keys: ${{ runner.os }}-pip-

      - name: Install checkov
        run: pip install checkov

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform validate
        run: terraform init -backend=false -no-color > /dev/null 2>&1 && terraform validate -no-color

      - name: TFLint
        run: tflint --recursive --no-color

      - name: Checkov
        run: checkov -d . --framework terraform --compact --quiet --skip-path app/tests/golden

  plan:
    name: Plan — LocalStack examples
    runs-on: ubuntu-latest
    needs: qa
    # Always runs on push to main and manual dispatch.
    # On PRs, runs after qa passes (path filter already gates the workflow trigger).

    env:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT_URL: http://localhost:4566

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Start LocalStack
        run: |
          docker compose -f tests/localstack/docker-compose.yml up -d
          echo "Waiting for LocalStack to be ready..."
          timeout 60 bash -c 'until curl -sf http://localhost:4566/_localstack/health; do sleep 2; done'
          echo ""
          echo "LocalStack is ready."

      - name: Plan all examples
        run: |
          failed=0
          for dir in examples/*/; do
            example=$(basename "$dir")
            echo ""
            echo "=== Planning $example ==="

            tfvars=$(ls "$dir"*.tfvars 2>/dev/null | grep -v auto.tfvars | grep -v secrets | head -1)
            if [ -z "$tfvars" ]; then
              echo "SKIP: no .tfvars found"
              continue
            fi

            cd "$dir"
            terraform init -backend=false -no-color > /dev/null 2>&1

            if terraform plan -var-file="$(basename "$tfvars")" -no-color; then
              echo "PASS: $example"
            else
              echo "FAIL: $example"
              failed=1
            fi

            cd "$GITHUB_WORKSPACE"
          done

          if [ "$failed" -eq 1 ]; then
            echo ""
            echo "One or more example plans failed."
            exit 1
          fi

      - name: Tear down LocalStack
        if: always()
        run: docker compose -f tests/localstack/docker-compose.yml down
