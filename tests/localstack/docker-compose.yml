version: "3.8"

services:
  localstack:
    image: localstack/localstack:latest
    container_name: evm-cloud-localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,sqs,sns,iam,sts,ec2,ecs,rds,logs,ssm,secretsmanager
      - DEBUG=0
      - AWS_DEFAULT_REGION=us-east-1
      - DATA_DIR=/var/lib/localstack
    volumes:
      - localstack-data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  localstack-data:
