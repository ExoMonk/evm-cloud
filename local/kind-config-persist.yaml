## NOTE: This file is a TEMPLATE. It is generated at runtime by up.sh
## with $HOME expanded. Do not use this file directly with kind.
## See kind-config.yaml for the non-persistent variant.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30545    # Anvil NodePort
        hostPort: 8545
        protocol: TCP
      - containerPort: 30400    # eRPC NodePort
        hostPort: 4000
        protocol: TCP
      - containerPort: 30123    # ClickHouse HTTP NodePort
        hostPort: 8123
        protocol: TCP
      - containerPort: 31808    # rindexer metrics NodePort
        hostPort: 18080
        protocol: TCP
      - containerPort: 30300    # Grafana NodePort (optional)
        hostPort: 3000
        protocol: TCP
    extraMounts:
      - hostPath: __EVM_CLOUD_DATA_DIR__
        containerPath: /var/local-data
